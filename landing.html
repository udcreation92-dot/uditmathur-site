<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Udit Mathur</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #f1f5f9;
      padding: 2rem 1rem;
    }

    .greeting {
      font-size: clamp(0.85rem, 2.5vw, 1rem);
      color: #64748b;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    h1 {
      font-size: clamp(2rem, 7vw, 3.5rem);
      font-weight: 700;
      background: linear-gradient(135deg, #e2e8f0 30%, #64748b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 3rem;
      text-align: center;
    }

    .apps {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      width: 100%;
      max-width: 440px;
    }

    .apps.three .app-card:last-child {
      grid-column: 1 / -1;
    }

    @media (max-width: 360px) {
      .apps { grid-template-columns: 1fr; }
    }

    .app-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      padding: 2rem 1.25rem;
      background: #1e293b;
      border: 1px solid #1e293b;
      border-radius: 1.25rem;
      text-decoration: none;
      color: inherit;
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .app-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    }

    .app-card:active { transform: scale(0.97); }

    .app-card.tasks   { border-top: 3px solid #818cf8; }
    .app-card.accounts { border-top: 3px solid #3b82f6; }
    .app-card.cameras  { border-top: 3px solid #22c55e; }

    .app-icon { font-size: 2.25rem; line-height: 1; }

    .app-name {
      font-size: 1.1rem;
      font-weight: 600;
      color: #e2e8f0;
    }

    .app-desc {
      font-size: 0.75rem;
      color: #475569;
      text-align: center;
      line-height: 1.5;
    }

    footer {
      margin-top: 3.5rem;
      font-size: 0.7rem;
      color: #1e293b;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <p class="greeting">Welcome back</p>
  <h1>Udit Mathur</h1>

  <div class="apps three">
    <a href="/task/" class="app-card tasks">
      <span class="app-icon">✅</span>
      <span class="app-name">Tasks</span>
      <span class="app-desc">Manage your tasks &amp; to-dos</span>
    </a>
    <a href="/accounts/" class="app-card accounts">
      <span class="app-icon">📒</span>
      <span class="app-name">Accounts</span>
      <span class="app-desc">Bookkeeping &amp; ledgers</span>
    </a>
    <a href="/cameras/" class="app-card cameras">
      <span class="app-icon">📷</span>
      <span class="app-name">Cameras</span>
      <span class="app-desc">Live security camera feeds</span>
    </a>
  </div>

  <footer>uditmathur.uk</footer>
</body>
</html>
