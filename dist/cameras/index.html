<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Camera Monitor — uditmathur.uk</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: #1e1e2e;
      --accent: #5b8dee;
      --text: #e2e8f0;
      --muted: #64748b;
      --live: #22c55e;
      --error: #ef4444;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--accent);
    }

    #clock {
      font-size: 0.85rem;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    #status-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      color: var(--muted);
    }

    #status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--live);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .toolbar label { font-size: 0.8rem; color: var(--muted); }

    .toolbar select, .toolbar input {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 0.8rem;
      cursor: pointer;
    }

    .toolbar select:focus, .toolbar input:focus {
      outline: 1px solid var(--accent);
    }

    #grid {
      display: grid;
      gap: 3px;
      padding: 16px;
      grid-template-columns: repeat(4, 1fr);
    }

    .cam-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      position: relative;
      aspect-ratio: 16/9;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .cam-card:hover { border-color: var(--accent); }

    .cam-card.fullscreen-card {
      position: fixed;
      inset: 0;
      z-index: 999;
      border-radius: 0;
      aspect-ratio: unset;
    }

    .cam-card video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #000;
    }

    .cam-label {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.75));
      padding: 20px 10px 8px;
      font-size: 0.72rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .cam-label span { font-weight: 500; }

    .badge {
      font-size: 0.65rem;
      padding: 2px 6px;
      border-radius: 4px;
      background: var(--live);
      color: #000;
      font-weight: 600;
    }

    .badge.offline {
      background: var(--error);
      color: #fff;
    }

    .cam-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.55);
      font-size: 0.8rem;
      color: var(--muted);
      pointer-events: none;
    }

    .cam-overlay.hidden { display: none; }

    .close-btn {
      position: absolute;
      top: 12px; right: 12px;
      background: rgba(0,0,0,0.6);
      border: 1px solid var(--border);
      color: var(--text);
      width: 32px; height: 32px;
      border-radius: 6px;
      font-size: 1.1rem;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .cam-card.fullscreen-card .close-btn { display: flex; }

    /* Grid layouts */
    .layout-1 { grid-template-columns: 1fr; }
    .layout-2 { grid-template-columns: repeat(2, 1fr); }
    .layout-3 { grid-template-columns: repeat(3, 1fr); }
    .layout-4 { grid-template-columns: repeat(4, 1fr); }

    @media (max-width: 900px) {
      #grid { grid-template-columns: repeat(2, 1fr) !important; }
    }
    @media (max-width: 500px) {
      #grid { grid-template-columns: 1fr !important; }
    }
  </style>
</head>
<body>

<header>
  <h1>&#9679; Camera Monitor</h1>
  <div id="status-bar">
    <div id="status-dot"></div>
    <span id="stream-status">Connecting…</span>
  </div>
  <div id="clock">--:--:--</div>
</header>

<div class="toolbar">
  <label>Layout</label>
  <select id="layout-select">
    <option value="4">4 columns</option>
    <option value="3">3 columns</option>
    <option value="2">2 columns</option>
    <option value="1">1 column</option>
  </select>
  <label style="margin-left:12px">Relay</label>
  <input id="relay-url" type="text" value="https://stream.uditmathur.uk" style="width:260px" />
  <button onclick="reloadAll()" style="
    background:var(--accent);color:#fff;border:none;padding:5px 14px;
    border-radius:6px;font-size:0.8rem;cursor:pointer;margin-left:4px">
    Reload
  </button>
</div>

<div id="grid"></div>

<script>
  // ── Config: edit camera names. Streams are served by go2rtc at /api/ws?src=NAME
  const CAMERAS = [
    { id: 'camera_01', name: 'Camera 1 (192.168.1.10)' },
    { id: 'camera_02', name: 'Camera 2 (192.168.1.26)' },
  ];

  const grid = document.getElementById('grid');
  const relayInput = document.getElementById('relay-url');
  const statusEl = document.getElementById('stream-status');
  let liveCount = 0;

  function getRelay() {
    return relayInput.value.replace(/\/$/, '');
  }

  // go2rtc exposes HLS at /api/stream.m3u8?src=NAME
  function hlsUrl(id) {
    return `${getRelay()}/api/stream.m3u8?src=${id}`;
  }

  function buildCard(cam) {
    const card = document.createElement('div');
    card.className = 'cam-card';
    card.id = `card-${cam.id}`;

    const video = document.createElement('video');
    video.muted = true;
    video.autoplay = true;
    video.playsInline = true;

    const overlay = document.createElement('div');
    overlay.className = 'cam-overlay';
    overlay.textContent = 'Connecting…';

    const label = document.createElement('div');
    label.className = 'cam-label';
    label.innerHTML = `<span>${cam.name}</span><span class="badge offline" id="badge-${cam.id}">OFFLINE</span>`;

    const closeBtn = document.createElement('button');
    closeBtn.className = 'close-btn';
    closeBtn.innerHTML = '&#10005;';
    closeBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      card.classList.remove('fullscreen-card');
    });

    card.appendChild(video);
    card.appendChild(overlay);
    card.appendChild(label);
    card.appendChild(closeBtn);

    card.addEventListener('click', () => {
      if (!card.classList.contains('fullscreen-card')) {
        card.classList.add('fullscreen-card');
      }
    });

    initHls(cam.id, video, overlay);
    return card;
  }

  function initHls(id, video, overlay) {
    const src = hlsUrl(id);
    const badge = document.getElementById(`badge-${id}`);

    if (Hls.isSupported()) {
      const hls = new Hls({ lowLatencyMode: true });
      hls.loadSource(src);
      hls.attachMedia(video);

      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        video.play().catch(() => {});
        overlay.classList.add('hidden');
        if (badge) { badge.textContent = 'LIVE'; badge.classList.remove('offline'); }
      });

      hls.on(Hls.Events.FRAG_LOADED, () => {
        if (badge && badge.classList.contains('offline')) {
          badge.textContent = 'LIVE';
          badge.classList.remove('offline');
          liveCount++;
          updateStatus();
        }
      });

      hls.on(Hls.Events.ERROR, (_, data) => {
        if (data.fatal) {
          overlay.classList.remove('hidden');
          overlay.textContent = 'Offline';
          if (badge) { badge.textContent = 'OFFLINE'; badge.classList.add('offline'); }
          setTimeout(() => initHls(id, video, overlay), 10000);
        }
      });

    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      // Safari native HLS
      video.src = src;
      video.addEventListener('loadedmetadata', () => {
        video.play().catch(() => {});
        overlay.classList.add('hidden');
        if (badge) { badge.textContent = 'LIVE'; badge.classList.remove('offline'); }
        liveCount++;
        updateStatus();
      });
    } else {
      overlay.textContent = 'HLS not supported';
    }
  }

  function updateStatus() {
    const total = CAMERAS.length;
    statusEl.textContent = `${liveCount} / ${total} cameras live`;
  }

  function reloadAll() {
    liveCount = 0;
    grid.innerHTML = '';
    renderGrid();
  }

  function renderGrid() {
    CAMERAS.forEach(cam => grid.appendChild(buildCard(cam)));
    updateStatus();
  }

  document.getElementById('layout-select').addEventListener('change', (e) => {
    grid.className = '';
    grid.id = 'grid';
    grid.style.gridTemplateColumns = `repeat(${e.target.value}, 1fr)`;
  });

  // Clock
  setInterval(() => {
    document.getElementById('clock').textContent =
      new Date().toLocaleTimeString('en-GB');
  }, 1000);

  renderGrid();
</script>

</body>
</html>
