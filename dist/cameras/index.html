<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Camera Recordings — uditmathur.uk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a28;
      --border: #1e1e2e; --accent: #5b8dee; --text: #e2e8f0;
      --muted: #64748b; --live: #22c55e; --error: #ef4444;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 24px; background: var(--surface); border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    header h1 { font-size: 1rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: var(--accent); }
    #clock { font-size: 0.85rem; color: var(--muted); font-variant-numeric: tabular-nums; }

    .layout { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar ─────────────────────────────────────── */
    .sidebar {
      width: 260px; flex-shrink: 0; background: var(--surface);
      border-right: 1px solid var(--border); display: flex; flex-direction: column;
      overflow-y: auto;
    }
    .sidebar-section { padding: 12px 16px; border-bottom: 1px solid var(--border); }
    .sidebar-section h3 { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 8px; }

    .cam-btn {
      width: 100%; text-align: left; padding: 8px 10px; border-radius: 6px;
      background: none; border: none; color: var(--text); font-size: 0.85rem;
      cursor: pointer; display: flex; align-items: center; gap: 8px; margin-bottom: 2px;
    }
    .cam-btn:hover { background: var(--surface2); }
    .cam-btn.active { background: var(--accent); color: #fff; }
    .cam-btn .cam-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }

    .date-btn {
      width: 100%; text-align: left; padding: 6px 10px; border-radius: 6px;
      background: none; border: none; color: var(--text); font-size: 0.82rem;
      cursor: pointer; margin-bottom: 2px;
    }
    .date-btn:hover { background: var(--surface2); }
    .date-btn.active { background: var(--surface2); color: var(--accent); font-weight: 600; }

    /* ── Clip list ───────────────────────────────────── */
    .clip-list {
      flex: 1; overflow-y: auto; padding: 8px;
      display: flex; flex-direction: column; gap: 4px;
    }
    .clip-item {
      padding: 8px 10px; border-radius: 6px; cursor: pointer;
      background: var(--surface2); border: 1px solid var(--border);
      font-size: 0.8rem; display: flex; align-items: center; gap: 8px;
      transition: border-color 0.15s;
    }
    .clip-item:hover { border-color: var(--accent); }
    .clip-item.active { border-color: var(--accent); background: #1a2540; }
    .clip-time { font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums; }
    .clip-size { color: var(--muted); margin-left: auto; font-size: 0.72rem; }

    /* ── Main player ─────────────────────────────────── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    .player-wrap {
      flex: 1; background: #000; display: flex; align-items: center;
      justify-content: center; position: relative; min-height: 0;
    }
    .player-wrap video { max-width: 100%; max-height: 100%; width: 100%; height: 100%; object-fit: contain; }

    .player-placeholder {
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      color: var(--muted); font-size: 0.9rem;
    }
    .player-placeholder .icon { font-size: 3rem; }

    .player-info {
      padding: 10px 20px; background: var(--surface); border-top: 1px solid var(--border);
      display: flex; align-items: center; gap: 16px; flex-shrink: 0; flex-wrap: wrap;
    }
    .player-info .label { font-size: 0.75rem; color: var(--muted); }
    .player-info .value { font-size: 0.85rem; font-weight: 500; }
    .nav-btn {
      padding: 5px 14px; border-radius: 6px; background: var(--surface2);
      border: 1px solid var(--border); color: var(--text); font-size: 0.8rem;
      cursor: pointer; margin-left: auto;
    }
    .nav-btn:hover { border-color: var(--accent); }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }

    .empty { padding: 24px; text-align: center; color: var(--muted); font-size: 0.82rem; }

    @media (max-width: 700px) {
      .layout { flex-direction: column; }
      .sidebar { width: 100%; max-height: 220px; border-right: none; border-bottom: 1px solid var(--border); }
    }
  </style>
</head>
<body>

<header>
  <h1>&#9679; Camera Recordings</h1>
  <div style="display:flex;align-items:center;gap:16px">
    <span style="font-size:0.75rem;color:var(--muted)">
      Server: <input id="server-url" value="https://recordings.uditmathur.uk" style="background:var(--bg);border:1px solid var(--border);color:var(--text);padding:3px 8px;border-radius:4px;font-size:0.75rem;width:240px" />
    </span>
    <div id="clock">--:--:--</div>
  </div>
</header>

<div class="layout">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-section">
      <h3>Cameras</h3>
      <div id="cam-list"><div class="empty">Loading…</div></div>
    </div>
    <div class="sidebar-section">
      <h3>Date</h3>
      <div id="date-list"><div class="empty">Select a camera</div></div>
    </div>
    <div class="sidebar-section" style="flex:1;overflow:hidden;display:flex;flex-direction:column;border-bottom:none">
      <h3>Clips</h3>
      <div id="clip-list" class="clip-list"><div class="empty">Select a date</div></div>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="player-wrap">
      <div id="placeholder" class="player-placeholder">
        <div class="icon">&#128247;</div>
        <div>Select a clip to play</div>
      </div>
      <video id="player" style="display:none" controls></video>
    </div>
    <div class="player-info">
      <div><div class="label">Camera</div><div class="value" id="info-cam">—</div></div>
      <div><div class="label">Date</div><div class="value" id="info-date">—</div></div>
      <div><div class="label">Time</div><div class="value" id="info-time">—</div></div>
      <div><div class="label">Size</div><div class="value" id="info-size">—</div></div>
      <button class="nav-btn" id="btn-prev" disabled onclick="navigate(-1)">&#9664; Prev</button>
      <button class="nav-btn" id="btn-next" disabled onclick="navigate(1)">Next &#9654;</button>
    </div>
  </div>
</div>

<script>
  let selectedCam = null, selectedDate = null, clips = [], currentClipIdx = -1;

  function getServer() { return document.getElementById('server-url').value.replace(/\/$/, ''); }

  async function api(path) {
    const r = await fetch(getServer() + path);
    return r.json();
  }

  function fmtSize(bytes) {
    if (bytes > 1024*1024*1024) return (bytes/1024/1024/1024).toFixed(1) + ' GB';
    if (bytes > 1024*1024) return (bytes/1024/1024).toFixed(1) + ' MB';
    return (bytes/1024).toFixed(0) + ' KB';
  }

  // ── Load cameras ──────────────────────────────────────────────────────────
  async function loadCameras() {
    const cams = await api('/recordings');
    const el = document.getElementById('cam-list');
    if (!cams.length) { el.innerHTML = '<div class="empty">No recordings found</div>'; return; }
    el.innerHTML = '';
    cams.forEach((cam, i) => {
      const btn = document.createElement('button');
      btn.className = 'cam-btn';
      btn.innerHTML = `<span class="cam-dot"></span>${cam.replace('_', ' ').toUpperCase()}`;
      btn.onclick = () => selectCamera(cam, btn);
      el.appendChild(btn);
      if (i === 0) btn.click();
    });
  }

  // ── Select camera ─────────────────────────────────────────────────────────
  async function selectCamera(cam, btn) {
    selectedCam = cam;
    document.querySelectorAll('.cam-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('date-list').innerHTML = '<div class="empty">Loading…</div>';
    document.getElementById('clip-list').innerHTML = '<div class="empty">Select a date</div>';

    const dates = await api(`/recordings/${cam}`);
    const el = document.getElementById('date-list');
    if (!dates.length) { el.innerHTML = '<div class="empty">No recordings</div>'; return; }
    el.innerHTML = '';
    dates.forEach((date, i) => {
      const btn = document.createElement('button');
      btn.className = 'date-btn';
      btn.textContent = date;
      btn.onclick = () => selectDate(date, btn);
      el.appendChild(btn);
      if (i === 0) btn.click();
    });
  }

  // ── Select date ───────────────────────────────────────────────────────────
  async function selectDate(date, btn) {
    selectedDate = date;
    document.querySelectorAll('.date-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('clip-list').innerHTML = '<div class="empty">Loading…</div>';

    clips = await api(`/recordings/${selectedCam}/${date}`);
    const el = document.getElementById('clip-list');
    if (!clips.length) { el.innerHTML = '<div class="empty">No clips</div>'; return; }
    el.innerHTML = '';
    clips.forEach((clip, i) => {
      const item = document.createElement('div');
      item.className = 'clip-item';
      item.id = `clip-${i}`;
      item.innerHTML = `<span>&#9654;</span><span class="clip-time">${clip.time}</span><span class="clip-size">${fmtSize(clip.size)}</span>`;
      item.onclick = () => playClip(i);
      el.appendChild(item);
    });
    playClip(0);
  }

  // ── Play clip ─────────────────────────────────────────────────────────────
  function playClip(idx) {
    if (idx < 0 || idx >= clips.length) return;
    currentClipIdx = idx;
    const clip = clips[idx];
    const url = `${getServer()}/recordings/${selectedCam}/${selectedDate}/${clip.name}`;

    document.querySelectorAll('.clip-item').forEach(el => el.classList.remove('active'));
    const el = document.getElementById(`clip-${idx}`);
    if (el) { el.classList.add('active'); el.scrollIntoView({ block: 'nearest' }); }

    const video = document.getElementById('player');
    const placeholder = document.getElementById('placeholder');
    video.style.display = 'block';
    placeholder.style.display = 'none';
    video.src = url;
    video.play().catch(() => {});

    document.getElementById('info-cam').textContent = selectedCam.replace('_', ' ').toUpperCase();
    document.getElementById('info-date').textContent = selectedDate;
    document.getElementById('info-time').textContent = clip.time;
    document.getElementById('info-size').textContent = fmtSize(clip.size);
    document.getElementById('btn-prev').disabled = idx === 0;
    document.getElementById('btn-next').disabled = idx === clips.length - 1;

    // Auto-play next clip
    video.onended = () => { if (idx + 1 < clips.length) playClip(idx + 1); };
  }

  function navigate(dir) { playClip(currentClipIdx + dir); }

  // Clock
  setInterval(() => {
    document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-GB');
  }, 1000);

  loadCameras();
</script>
</body>
</html>
