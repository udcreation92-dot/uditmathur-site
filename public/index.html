<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Udit Mathur</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      color: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 2rem;
    }

    .card {
      text-align: center;
      max-width: 420px;
      width: 100%;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 700;
      margin: 0 auto 1.5rem;
      color: white;
      letter-spacing: -1px;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 0.4rem;
    }

    .tagline {
      color: #888;
      font-size: 0.95rem;
      margin-bottom: 2.5rem;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .link-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 1.25rem;
      border-radius: 12px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      color: #f5f5f5;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      transition: background 0.15s, border-color 0.15s;
    }

    .link-btn:hover {
      background: #222;
      border-color: #444;
    }

    .link-btn .icon { font-size: 1.1rem; }
    .link-btn .arrow { color: #555; font-size: 0.85rem; }
    .link-btn:hover .arrow { color: #888; }

    footer {
      margin-top: 3rem;
      color: #444;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">UM</div>
    <h1>Udit Mathur</h1>
    <p class="tagline">uditmathur.uk</p>

    <div class="links">
      <a href="/task" class="link-btn">
        <span><span class="icon">✓</span>&nbsp; Task Manager</span>
        <span class="arrow">→</span>
      </a>
    </div>
  </div>

  <footer>uditmathur.uk</footer>
</body>
</html>
